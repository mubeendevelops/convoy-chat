services:
  postgres:
    image: postgres:17-alpine
    container_name: convoychat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: convoy
      POSTGRES_PASSWORD: convoy
      POSTGRES_DB: convoychat
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U convoy -d convoychat"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: convoychat-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
